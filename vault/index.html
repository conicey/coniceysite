<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VAULT // CONICEY</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="screen-login" class="screen" role="main" aria-label="Login">
    <div class="login-bg" aria-hidden="true"><div class="grid-lines"></div></div>
    <div class="login-box">
      <div class="vault-logo" aria-label="Vault">
        <div class="vault-icon" aria-hidden="true">
          <svg viewBox="0 0 16 16">
            <rect x="2" y="6" width="12" height="9" rx="1"/>
            <path d="M5 6V4a3 3 0 0 1 6 0v2"/>
            <circle cx="8" cy="10.5" r="1.2"/>
            <line x1="8" y1="11.7" x2="8" y2="13"/>
          </svg>
        </div>
        <span class="vault-name" data-text="VAULT">VAULT</span>
      </div>

      <div class="login-title">// secure_access · conicey</div>

      <div id="login-step-1" class="login-step active" aria-hidden="false">
        <button id="btn-request-token" class="btn-primary" type="button">
          &gt; Request Access Token
        </button>
      </div>

      <div id="login-step-2" class="login-step" aria-hidden="true">
        <div class="status-row" id="login-status-row">
          <span class="status-dot" id="login-status-dot" aria-hidden="true"></span>
          <span class="status-text" id="login-status-text">Waiting…</span>
        </div>
        <div class="info-box"><p>// token dispatched → check inbox</p></div>
        <div class="countdown-row">
          <span class="countdown-label">expires_in:</span>
          <span id="login-countdown" class="countdown-value">10:00</span>
        </div>
        <button id="btn-unlock" class="btn-primary" type="button" disabled>
          &gt; Paste &amp; Unlock
        </button>
        <button id="btn-back" class="btn-back" type="button">← request new token</button>
      </div>
    </div>
  </div>

  <!-- VAULT SCREEN -->
  <div id="screen-vault" class="screen hidden" role="main" aria-label="Vault">

    <header class="topbar" role="banner">
      <div class="topbar-left">
        <div class="topbar-logo">
          <div class="tl-icon" aria-hidden="true">
            <svg viewBox="0 0 10 10">
              <rect x="1" y="3" width="8" height="6" rx="0.5"/>
              <path d="M3 3V2a2 2 0 0 1 4 0v1"/>
              <circle cx="5" cy="6.5" r="0.8"/>
            </svg>
          </div>
          <span>VAULT</span>
        </div>
        <nav class="breadcrumb" id="breadcrumb" aria-label="Current location">
          <span class="crumb active">all_files</span>
        </nav>
      </div>
      <div class="topbar-right">
        <div class="session-badge">
          <span class="session-dot" aria-hidden="true"></span>
          <span>session_active</span>
        </div>
        <button class="tb-btn tb-btn--danger" id="btn-lock" type="button">
          <svg viewBox="0 0 14 14">
            <rect x="2" y="6" width="10" height="7" rx="1"/>
            <path d="M4 6V4a3 3 0 0 1 6 0v2"/>
          </svg>
          lock
        </button>
      </div>
    </header>

    <div class="action-bar" role="toolbar">
      <button class="action-btn" id="btn-upload" type="button">
        <svg viewBox="0 0 12 12">
          <path d="M6 9V3M3 5.5L6 3l3 2.5"/><path d="M2 9.5h8"/>
        </svg>
        <span>upload</span>
      </button>
      <button class="action-btn" id="btn-new-note" type="button">
        <svg viewBox="0 0 12 12">
          <rect x="1.5" y="1.5" width="9" height="9" rx="1"/>
          <line x1="3.5" y1="4" x2="8.5" y2="4"/>
          <line x1="3.5" y1="6" x2="8.5" y2="6"/>
          <line x1="3.5" y1="8" x2="6" y2="8"/>
        </svg>
        <span>new_note</span>
      </button>
      <button class="action-btn" id="btn-new-code" type="button">
        <svg viewBox="0 0 12 12">
          <polyline points="3,3.5 1,6 3,8.5"/>
          <polyline points="9,3.5 11,6 9,8.5"/>
          <line x1="7" y1="2" x2="5" y2="10"/>
        </svg>
        <span>new_snippet</span>
      </button>
      <div class="search-wrap">
        <svg viewBox="0 0 12 12">
          <circle cx="5" cy="5" r="3.5"/><line x1="7.5" y1="7.5" x2="10" y2="10"/>
        </svg>
        <input id="search-input" type="search" class="search-input" placeholder="search_vault..." aria-label="Search" />
      </div>
    </div>

    <div class="vault-body" id="vault-body">

      <div class="list-panel" id="list-panel">
        <div class="file-list" id="file-list"></div>
        <div class="empty-state hidden" id="empty-state">
          <svg viewBox="0 0 32 32">
            <path d="M4 6a2 2 0 0 1 2-2h8l3 4h9a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z"/>
          </svg>
          <p>no_files_found</p>
        </div>
        <div class="sidebar-footer">
          <div class="storage-label" id="storage-label">storage</div>
          <div class="storage-bar">
            <div class="storage-fill" id="storage-fill"></div>
          </div>
        </div>
      </div>

      <div class="divider" id="divider-a" aria-hidden="true"></div>

      <div class="notepad-panel" id="notepad-panel" style="display:none;">
        <div class="notepad-header">
          <span class="notepad-title" id="notepad-title">untitled</span>
          <button class="notepad-close" id="notepad-close" type="button">✕</button>
        </div>
        <textarea class="notepad-area" id="notepad-area" placeholder="// start typing..." spellcheck="true"></textarea>
      </div>

      <div class="divider" id="divider-b" style="display:none;" aria-hidden="true"></div>

      <div class="detail-panel" id="detail-panel">
        <div class="detail-empty" id="detail-empty">
          <svg viewBox="0 0 32 32">
            <rect x="4" y="4" width="24" height="24" rx="2"/>
            <line x1="9" y1="11" x2="23" y2="11"/>
            <line x1="9" y1="16" x2="23" y2="16"/>
            <line x1="9" y1="21" x2="17" y2="21"/>
          </svg>
          <p>select_file</p>
        </div>
        <div id="detail-content" class="hidden">
          <div class="detail-header">
            <div class="detail-name" id="detail-name"></div>
            <div class="detail-type" id="detail-type"></div>
          </div>
          <div class="detail-preview" id="detail-preview"></div>
          <div class="detail-meta" id="detail-meta"></div>
          <div class="detail-actions" id="detail-actions"></div>
        </div>
      </div>

    </div>

    <div id="context-menu" class="context-menu" role="menu" hidden>
      <button class="ctx-item" id="ctx-open" role="menuitem">
        <svg viewBox="0 0 12 12"><path d="M2 6h8M8 3l3 3-3 3"/></svg>open
      </button>
      <button class="ctx-item" id="ctx-rename" role="menuitem">
        <svg viewBox="0 0 12 12"><path d="M8 2l2 2-6 6H2V8z"/></svg>rename
      </button>
      <button class="ctx-item" id="ctx-duplicate" role="menuitem">
        <svg viewBox="0 0 12 12"><rect x="4" y="4" width="7" height="7" rx="1"/><path d="M8 4V2H1v7h2"/></svg>duplicate
      </button>
      <div class="ctx-separator"></div>
      <button class="ctx-item" id="ctx-download" role="menuitem">
        <svg viewBox="0 0 12 12"><path d="M6 2v6M3 6l3 3 3-3"/><path d="M2 9.5h8"/></svg>download
      </button>
      <div class="ctx-separator"></div>
      <button class="ctx-item ctx-item--danger" id="ctx-delete" role="menuitem">
        <svg viewBox="0 0 12 12"><path d="M2 3h8M5 3V2h2v1M4 5l.5 5M8 5l-.5 5M3 3l.5 7h5L9 3"/></svg>delete
      </button>
    </div>

  </div>

  <!-- MODAL -->
  <div id="modal-overlay" class="modal-overlay" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal" id="modal-box">
      <h2 class="modal-title" id="modal-title"></h2>
      <p class="modal-sub" id="modal-sub"></p>
      <input id="modal-input" type="text" class="modal-input" autocomplete="off" />
      <div class="modal-actions">
        <button class="btn-ghost" id="btn-modal-cancel" type="button">cancel</button>
        <button class="btn-primary btn-primary--flex" id="btn-modal-confirm" type="button">confirm</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite" aria-atomic="true"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://bpdgllhwfzaqhmppoftu.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable__qwV9qGyXhC9-8QfiXvuqg_W9lEh6Jz';
    window.supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  </script>
  <script src="../lib/api.js"></script>
  <script src="state.js"></script>
  <script src="toast.js"></script>
  <script src="modal.js"></script>
  <script src="explorer.js"></script>
  <script src="app.js"></script>
</body>
</html>
